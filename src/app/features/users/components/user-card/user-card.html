<div class="user-card">
  <div class="user-avatar">{{ user().username.charAt(0) }}</div>
  <div class="user-info">
    <h3>{{ user().name }}</h3>
    <p>{{ user().email }}</p>
    <span class="role" [class]="user().role">{{ user().role }}</span>
  </div>
  <div class="user-actions">
    <button (click)="edit.emit(user())" class="btn-edit">✏️</button>
    <button (click)="delete.emit(user().id)" class="btn-delete">🗑️</button>
  </div>
</div>
